name: Ota
description: Run Ota in GitHub Actions and publish summaries, annotations, comments, and receipt artifacts.
author: ota.run

inputs:
  command:
    description: "Ota command to run. Supported values: doctor, receipt."
    required: false
    default: receipt
  path:
    description: Repo or contract target passed to Ota.
    required: false
    default: .
  working-directory:
    description: Working directory used when invoking Ota.
    required: false
    default: .
  execution-mode:
    description: "Ota execution mode. Supported values: native, container."
    required: false
    default: native
  member:
    description: Optional monorepo member target.
    required: false
  archive:
    description: Add --archive when command=receipt.
    required: false
    default: "true"
  annotate:
    description: Emit GitHub annotations from Ota findings.
    required: false
    default: "true"
  max-annotations:
    description: Maximum findings to emit as annotations.
    required: false
    default: "20"
  comment-pr:
    description: Create or update a sticky pull request comment.
    required: false
    default: "false"
  comment-pr-only:
    description: Only comment when the workflow event is a pull request.
    required: false
    default: "true"
  artifact-name:
    description: Uploaded artifact name.
    required: false
    default: ota-report
  artifact-retention-days:
    description: Optional artifact retention in days.
    required: false
  fail-on-error:
    description: Fail the action when Ota reports a blocked outcome.
    required: false
    default: "true"
  install:
    description: "Ota installation mode. Supported values: auto, always, never."
    required: false
    default: auto
  ota-version:
    description: Optional Ota version to install when the action performs installation.
    required: false
  ota-bin:
    description: Ota binary name or path to use after installation resolution.
    required: false
    default: ota
  output-path:
    description: Where the captured Ota JSON output is written.
    required: false
    default: .ota-action-output.json
  github-token:
    description: Token used to create or update pull request comments.
    required: false

outputs:
  ok:
    description: Whether Ota reported an ok result.
  status:
    description: "Derived action status: ready, risky, or blocked."
  output-path:
    description: Path to the captured Ota JSON output.
  archive-path:
    description: Archived receipt path when receipt --archive produced one.
  artifact-name:
    description: Uploaded artifact name.
  error-count:
    description: Error count from the Ota summary.
  warn-count:
    description: Warning count from the Ota summary.
  info-count:
    description: Info count from the Ota summary.
  primary-summary:
    description: Primary blocker or top finding summary.

runs:
  using: node24
  main: dist/index.js
