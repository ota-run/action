name: CI

on:
  push:
  pull_request:

jobs:
  repo:
    name: repo verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install ota
        shell: bash
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate contract
        run: ota validate

      - name: Install dependencies
        run: ota run setup --stream

      - name: Verify
        run: ota run ci --stream

  hosted-runner-smoke:
    name: action smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create smoke contract
        shell: pwsh
        run: |
          $dir = ".github/fixtures/smoke"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          @"
          version: 1
          project:
            name: smoke
            type: application
          "@ | Set-Content -Path "$dir/ota.yaml" -Encoding utf8

      - name: Action smoke test
        uses: ./
        with:
          command: doctor
          path: .github/fixtures/smoke
          annotate: false
          artifact-name: ota-smoke-${{ matrix.os }}
